<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ proposal.title }}</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1a2332;
            --text-muted: #5c6b7a;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,.06);
        }
        * { box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; min-height: 100vh; padding: 2rem 1rem; line-height: 1.5; }
        .wrap { max-width: 560px; margin: 0 auto; }
        h1 { font-size: 1.25rem; font-weight: 700; margin: 0 0 0.5rem; }
        .meta { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem; }
        .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.25rem 1.5rem; margin-bottom: 1rem; white-space: pre-wrap; font-size: 0.95rem; }
        .btn { display: inline-block; margin-top: 0.5rem; padding: 0.6rem 1.2rem; font-family: inherit; font-size: 0.9rem; font-weight: 600; color: #fff; background: var(--accent); border: none; border-radius: 8px; text-decoration: none; }
        .btn:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--text-muted); }
        .btn-secondary:hover { background: #4a5568; }
        .btn-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.5rem; }
        .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn-outline:hover { background: rgba(37, 99, 235, 0.1); }
        form.inline-form { display: inline; }
        .meta.archived-label { color: var(--text-muted); font-style: italic; }
        .nav-header { margin-bottom: 1.5rem; font-size: 0.95rem; }
        .nav-header a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .nav-header a:hover { text-decoration: underline; }
        .nav-header span { color: var(--text-muted); margin: 0 0.5rem; }
        .back-link { margin-bottom: 1rem; font-size: 0.9rem; }
        .back-link a { color: var(--accent); text-decoration: none; }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="wrap">
        <nav class="nav-header" aria-label="Навигация">
            <a href="{{ url_for('index') }}">Генератор КП</a><span>|</span>
            <a href="{{ url_for('list_proposals') }}">Сохранённые КП</a>
        </nav>
        <p class="back-link"><a href="{{ url_for('list_proposals', show='archived' if proposal.get('archived') else 'active') }}">← К списку сохранённых</a></p>
        <h1>{{ proposal.title }}</h1>
        <div class="meta">Сохранено: {{ proposal.created_at }}{% if proposal.get('archived') %} <span class="archived-label">· В архиве</span>{% endif %}</div>
        <div class="card">{{ proposal.text }}</div>
        <div class="btn-group">
            <a href="{{ url_for('download_saved_pdf', proposal_id=proposal.id) }}" class="btn btn-secondary">Скачать PDF</a>
            {% if proposal.get('archived') %}
            <form action="{{ url_for('unarchive_proposal', proposal_id=proposal.id) }}" method="post" class="inline-form">
                <button type="submit" class="btn btn-outline">Из архива</button>
            </form>
            {% else %}
            <form action="{{ url_for('archive_proposal', proposal_id=proposal.id) }}" method="post" class="inline-form">
                <button type="submit" class="btn btn-outline">В архив</button>
            </form>
            {% endif %}
        </div>
    </div>
</body>
</html>
